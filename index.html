<style>

  .detail-panel { width: 320px; min-width: 320px; border-left: 0.5px solid var(--border-tertiary); display: flex; flex-direction: column; overflow: hidden; }

  .vec-bars { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
  .vec-row { display: flex; align-items: center; gap: 8px; }

  .vec-bar-outer { flex: 1; height: 8px; background: var(--bg-secondary); border-radius: 4px; overflow: hidden; }
  .vec-bar-inner { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .vec-val { font-size: 10px; color: var(--text-secondary); width: 30px; text-align: right; }
  .tags-wrap { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }

  .rag-pipeline { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 12px; margin-bottom: 8px; border: 0.5px solid var(--border-tertiary); }
  .pipeline-label { font-size: 10px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .pipeline-steps { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .pipeline-step { font-size: 10px; padding: 3px 8px; border-radius: 10px; background: var(--bg-primary); border: 0.5px solid var(--border-tertiary); color: var(--text-secondary); }
  .pipeline-step.active-step { background: #e6f1fb; color: #0c447c; border-color: #b5d4f4; }
  .pipeline-arrow { font-size: 10px; color: var(--text-tertiary); }
  @media (max-width: 900px) {
    .detail-panel { display: none; }
    .app-wrap { padding: 8px; }
  }
  @media (max-width: 640px) {
    .sidebar { display: none; }
  }
</style>

  { id:'c5', name:'Zenith Office Lease', type:'LEASE', badge:'badge-lease', date:'2023-11-30', parties:'Zenith Real Estate & Orion Tech', clauses:['cl11','cl12'] },

const CLAUSES = [
  {
    id:'cl1', contract:'c1', type:'Confidentiality', risk:'high',
    text:'Each party agrees to maintain in strict confidence all Confidential Information received from the other party and shall not disclose such information to any third party without prior written consent. This obligation shall survive termination of this Agreement for a period of five (5) years.',
    summary:'Mutual 5-year confidentiality obligation with no third-party disclosure without written consent. The 5-year post-termination tail is longer than market standard (typically 2–3 years) and may be a negotiation point. Recommend aligning with industry norms.',

    chunk:3, totalChunks:11

  {
    id:'cl2', contract:'c1', type:'Governing Law', risk:'low',
    text:'This Agreement shall be governed by and construed in accordance with the laws of the State of Delaware, without giving effect to any choice of law provisions thereof. Any disputes shall be resolved by binding arbitration in New York, NY.',
    summary:'Delaware law governs with mandatory binding arbitration in New York. Standard and low-risk for technology agreements. No jury trial waiver is explicitly stated — this may be worth clarifying.',

    chunk:8, totalChunks:11

  {
    id:'cl3', contract:'c2', type:'Termination', risk:'high',
    text:'Either party may terminate this Agreement for convenience upon thirty (30) days written notice. Upon termination for cause, the non-breaching party may terminate immediately without notice. In either case, all outstanding fees become immediately due and payable upon termination.',
    summary:'Dual termination mechanism: 30-day convenience window plus immediate cause-based termination. The acceleration of all fees upon any termination — including convenience — creates significant financial exposure and should be closely reviewed.',

    summary:'Standard mutual consequential damages exclusion with a 12-month fee cap. Typical for SaaS/MSA agreements. Verify that carve-outs for gross negligence, fraud, data breaches, and indemnification obligations exist elsewhere in the agreement.',

    chunk:7, totalChunks:14
  },
  {
    id:'cl5', contract:'c2', type:'Indemnification', risk:'med',
    text:'Customer shall indemnify, defend, and hold harmless Provider from any claims arising from Customer\'s use of the Services in violation of this Agreement or applicable law. Provider shall indemnify Customer against claims that the Services infringe third-party IP rights.',

  },

    text:'Client shall pay all undisputed invoices within net thirty (30) days of receipt. Late payments shall accrue interest at 1.5% per month (18% per annum) or the maximum rate permitted by law, whichever is less. Disputed invoices must be raised in writing within 10 days of receipt.',

};

const VEC_DIMS = [
  { label:'Termination',   types:['Termination','Non-Compete'], color:'#378ADD' },
  { label:'Liability',     types:['Liability','Indemnification'], color:'#e24b4a' },
  { label:'Confidential',  types:['Confidentiality'], color:'#7f77dd' },
  { label:'Payment',       types:['Payment'], color:'#1d9e75' },
  { label:'IP / Ownership',types:['IP','Non-Compete'], color:'#ba7517' },
];

let activeContract = null;
let selectedClause = null;
let scope = 'all';
let searchQuery = '';
let typeFilter = 'all';

function pseudoEmbed(text) {
  const seed = text.toLowerCase();
  const dims = 32;
  const v = new Array(dims);
  const keywords = {
    termination:0,terminate:0,notice:1,convenience:1,cause:1,
    confidential:2,disclose:2,secret:2,proprietary:2,
    liability:3,damages:3,indemnif:4,hold:4,harmless:4,
    payment:5,invoice:5,fee:5,interest:5,
    intellectual:6,property:6,assign:6,work:6,hire:6,
    compete:7,restrict:7,noncompete:7,geographic:7,
    govern:8,law:8,jurisdiction:8,arbitration:8,
    employ:9,resign:9,severance:9,salary:9,
  };
  for(let i=0;i<dims;i++){
    let val=0;
    for(const [kw,dim] of Object.entries(keywords)){
      if(seed.includes(kw)){ val+=(dim===i%10)?0.7:-0.08; }
    }
    for(let j=0;j<Math.min(seed.length,200);j++){
      val+=Math.sin((seed.charCodeAt(j)+i)*0.37)*0.07;
    }
    v[i]=val;
  }
  return v;
}

function cosineSim(a,b){
  let dot=0,na=0,nb=0;
  for(let i=0;i<a.length;i++){dot+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}
  return dot/(Math.sqrt(na)*Math.sqrt(nb)||1);
}

function semanticSearch(query, clauses){
  const qv=pseudoEmbed(query);
  return clauses
    .map(c=>({...c, score:Math.max(0,Math.min(1,(cosineSim(qv,pseudoEmbed(c.text))+1)/2))}))
    .sort((a,b)=>b.score-a.score);
}

function getVisibleClauses(){
  let pool=[...CLAUSES];
  if(scope==='active'&&activeContract) pool=pool.filter(c=>c.contract===activeContract);
  if(typeFilter!=='all') pool=pool.filter(c=>c.type===typeFilter);
  if(searchQuery.trim()){
    pool=semanticSearch(searchQuery,pool).filter(c=>c.score>0.33);
  }
  return pool;
}

function renderContracts(){
  document.getElementById('contractList').innerHTML=CONTRACTS.map(c=>`
    <div class="contract-item ${activeContract===c.id?'active':''}" onclick="selectContract('${c.id}')">
      <div class="contract-name">${c.name}</div>
      <div class="contract-meta">${c.date} · ${c.clauses.length} clauses</div>
      <span class="contract-badge ${c.badge}">${c.type}</span>
    </div>
  `).join('');
  document.getElementById('totalContracts').textContent=CONTRACTS.length;
  document.getElementById('totalClauses').textContent=CLAUSES.length;
}

function renderClauses(){
  const clauses=getVisibleClauses();
  const container=document.getElementById('clauseResults');
  document.getElementById('resultsCount').textContent=`${clauses.length} clause${clauses.length!==1?'s':''}`;
  const t=document.getElementById('resultsTitle');
  if(searchQuery.trim()) t.textContent=`Results for "${searchQuery}"`;
  else if(scope==='active'&&activeContract) t.textContent=CONTRACTS.find(x=>x.id===activeContract)?.name||'Active doc';
  else t.textContent='All clauses';
  if(!clauses.length){
    container.innerHTML=`<div class="empty-state"><div>No clauses found</div><div style="font-size:11px;opacity:0.7">Try broader search terms</div></div>`;
    return;
  }
  container.innerHTML=clauses.map(c=>{
    const contract=CONTRACTS.find(x=>x.id===c.contract);
    const tc=TYPE_COLORS[c.type]||'background:#f1efe8;color:#444441';
    const score=c.score!==undefined?c.score:1;
    const pct=Math.round(score*100);
    return `<div class="clause-card ${selectedClause===c.id?'selected':''}" onclick="selectClause('${c.id}')">
      <div class="clause-top">
        <span class="clause-type" style="${tc}">${c.type}</span>
        <span class="risk-tag risk-${c.risk}">${c.risk} risk</span>
        <span class="clause-contract">${contract?.name||''}</span>
      </div>
      <div class="clause-text">${c.text}</div>
      <div class="clause-footer">
        <div class="similarity-bar"><div class="similarity-fill" style="width:${pct}%"></div></div>
        <span class="similarity-label">${searchQuery.trim()?pct+'% match':'chunk '+c.chunk+'/'+c.totalChunks}</span>
      </div>
    </div>`;
  }).join('');
}

function selectContract(id){
  activeContract=(activeContract===id)?null:id;
  renderContracts(); renderClauses();
}

function selectClause(id){
  selectedClause=id;
  renderClauses(); renderDetail();
}

function setScope(s){
  scope=s;
  document.getElementById('scopeAll').className='scope-btn'+(s==='all'?' active':'');
  document.getElementById('scopeActive').className='scope-btn'+(s==='active'?' active':'');
  renderClauses();
}

function renderDetail(){
  const clause=CLAUSES.find(c=>c.id===selectedClause);
  if(!clause) return;
  const contract=CONTRACTS.find(c=>c.id===clause.contract);
  const tc=TYPE_COLORS[clause.type]||'background:#f1efe8;color:#444441';
  const chunkBlocks=Array.from({length:clause.totalChunks},(_,i)=>
    `<div class="chunk-block ${i+1===clause.chunk?'active-chunk':''}" title="Chunk ${i+1}">${i+1}</div>`
  ).join('');
  const vecHTML=VEC_DIMS.map(d=>{
    const hit=d.types.includes(clause.type);
    const val=hit?0.82+Math.random()*0.12:0.08+Math.random()*0.15;
    const pct=Math.round(val*100);
    return `<div class="vec-row">
      <span class="vec-label">${d.label}</span>
      <div class="vec-bar-outer"><div class="vec-bar-inner" style="width:${pct}%;background:${d.color}"></div></div>
      <span class="vec-val">${val.toFixed(2)}</span>
    </div>`;
  }).join('');
  const tagsHTML=(clause.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('detailBody').innerHTML=`
    <div class="rag-pipeline">
      <div class="pipeline-label">RAG pipeline</div>
      <div class="pipeline-steps">
        <span class="pipeline-step active-step">PDF parse</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-step active-step">Chunk (256t/64o)</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-step active-step">Embed (768d)</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-step active-step">FAISS index</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-step active-step">Cosine retrieval</span>
        <span class="pipeline-arrow">→</span>
        <span class="pipeline-step active-step">LLM analysis</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Contract</div>
      <div class="detail-value" style="font-weight:500">${contract?.name||''}</div>
      <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${contract?.parties||''} · ${contract?.date||''}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Clause type & risk level</div>
      <div style="display:flex;gap:6px;align-items:center;margin-top:4px">
        <span class="clause-type" style="${tc}">${clause.type}</span>
        <span class="risk-tag risk-${clause.risk}">${clause.risk} risk</span>
      </div>
    </div>
    <div class="detail-section">
      <div class="detail-label">AI summary & negotiation flags</div>
      <div class="ai-summary">${clause.summary}</div>
      <div class="tags-wrap">${tagsHTML}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Semantic embedding — top 5 dimensions</div>
      <div class="vec-bars">${vecHTML}</div>
      <div style="font-size:10px;color:var(--text-secondary);margin-top:6px">768-dim vector space (FAISS IVFFlat index) · showing top 5 semantic dimensions</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Chunk position in document</div>
      <div class="chunk-viz">${chunkBlocks}</div>
      <div style="font-size:10px;color:var(--text-secondary);margin-top:6px">Chunk ${clause.chunk} of ${clause.totalChunks} · overlapping window (256 tokens, 64-token overlap)</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">Full clause text</div>
      <div class="clause-full">${clause.text}</div>
    </div>
  `;
}

let debounce;
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value;
  clearTimeout(debounce);
  debounce=setTimeout(renderClauses,220);
});
document.getElementById('clauseTypeFilter').addEventListener('change',e=>{
  typeFilter=e.target.value;
  renderClauses();
});

renderContracts();
renderClauses();
</script>
</body>
</html>
